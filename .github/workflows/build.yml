name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    # Windows runner: mgfxc's DirectX_12 profile asserts and dies in its Linux
    # libdxcompiler.so build, but runs fine natively on Windows.
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Pack Apos.Shapes
      run: dotnet pack Source/Apos.Shapes.csproj -c Release --include-source --include-symbols
    - name: Pack Apos.Shapes.KNI
      run: dotnet pack Source/Apos.Shapes.KNI.csproj -c Release --include-source --include-symbols
